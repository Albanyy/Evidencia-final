<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 20</title>
</head>
<body>

    <form id="formularioRegistro">
        <div>
            <label for="campoNombre">Nombre:</label>
            <input type="text" id="campoNombre" name="nombre">
            <span id="errorNombre" style="color: red;"></span>
        </div>
        <br>
        <div>
            <label for="campoCorreo">Correo:</label>
            <input type="text" id="campoCorreo" name="correo">
            <span id="errorCorreo" style="color: red;"></span>
        </div>
        <br>
        <div>
            <label for="campoEdad">Edad:</label>
            <input type="number" id="campoEdad" name="edad">
            <span id="errorEdad" style="color: red;"></span>
        </div>
        <br>
        <div>
            <label>
                <input type="checkbox" id="campoTerminos" name="terminos"> Acepto los términos
            </label>
            <span id="errorTerminos" style="color: red;"></span>
        </div>
        <br>
        <button type="submit">Registrar</button>
    </form>

    <p id="mensajeExito" style="color: green;"></p>

    <script src="app.js"></script>
</body>
</html>
